<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeSync - Editor</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" data-name="vs/editor/editor.main"
        href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css">
</head>

<body>
    <div id="toastContainer" class="toast-container"></div>

    <div class="editor-container">
        <header class="editor-header">
            <div class="header-left">
                <div class="editor-logo">CodeSync</div>
                <div class="room-info">
                    <span class="room-label">Room:</span>
                    <span class="room-id" id="roomIdText"></span>
                    <button class="copy-btn" id="copyRoomBtn" title="Copy Room ID">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M5.5 4.5H3.5C2.94772 4.5 2.5 4.94772 2.5 5.5V12.5C2.5 13.0523 2.94772 13.5 3.5 13.5H10.5C11.0523 13.5 11.5 13.0523 11.5 12.5V10.5"
                                stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                            <rect x="5.5" y="2.5" width="8" height="8" rx="1" stroke="currentColor"
                                stroke-width="1.5" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="header-right">
                <select class="language-selector" id="languageSelect">
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript</option>
                    <option value="c">C</option>
                    <option value="cpp">C++</option>
                    <option value="java">Java</option>
                </select>
                <button class="icon-btn" id="downloadBtn" title="Download current file">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 2V10M8 10L5 7M8 10L11 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 13H14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </button>
                <button class="icon-btn chat-toggle-btn" id="chatToggleBtn" title="Toggle chat">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2 2H14C14.5523 2 15 2.44772 15 3V10C15 10.5523 14.5523 11 14 11H5L2 14V3C2 2.44772 2.44772 2 2 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="chat-unread-badge" id="chatUnreadBadge" style="display:none;"></span>
                </button>
                <button class="run-btn" id="runBtn">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 2L12 8L4 14V2Z" fill="currentColor" />
                    </svg>
                    <span>Run Code</span>
                </button>
            </div>
        </header>

        <main class="editor-main">
            <aside class="sidebar">
                <h3>Active Users</h3>
                <div class="users-list" id="usersList"></div>
            </aside>

            <div class="code-area">
                <div class="code-editor">
                    <div id="monaco-editor-container"></div>
                </div>

                <div class="stdin-panel" id="stdinPanel">
                    <div class="stdin-header">
                        <span>Standard Input (stdin)</span>
                        <button class="stdin-toggle-btn" id="stdinToggleBtn" title="Collapse stdin">▾</button>
                    </div>
                    <textarea id="stdinInput" class="stdin-textarea" placeholder="Enter program input here (one value per line)..."></textarea>
                </div>

                <div class="output-panel">
                    <div class="output-header">
                        <h3>Output</h3>
                        <div class="output-status">
                            <span id="outputStatusText">Ready</span>
                            <span class="status-badge" id="statusBadge" style="display: none;"></span>
                        </div>
                    </div>
                    <div class="output-content" id="outputContent">
                        <div class="output-placeholder">Click "Run Code" to see the output here...</div>
                    </div>
                </div>
            </div>

            <aside class="chat-panel" id="chatPanel">
                <div class="chat-header">
                    <h3>Team Chat</h3>
                    <button class="chat-close-btn" id="chatCloseBtn">✕</button>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-system-msg">Chat is active. Say hello! 👋</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Type a message..." maxlength="500">
                    <button class="chat-send-btn" id="chatSendBtn">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M14 2L7 9M14 2L9 14L7 9L2 6L14 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </aside>
        </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
        var require = { paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.nls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.js"></script>

    <script src="/js/editor-monaco.js"></script>
</body>

</html>
